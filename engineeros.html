<!DOCTYPE html>
<html lang="en" data-theme="dark" data-accent="cyan">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Engineer OS — My Personal Operating System</title>
  <meta name="description" content="Engineer OS — offline productivity operating system for Fares Dkhili." />
  <style>
    :root {
      --bg: #07111f;
      --bg-2: #09172a;
      --panel: rgba(10, 19, 33, 0.72);
      --panel-2: rgba(12, 24, 40, 0.62);
      --card: rgba(17, 29, 48, 0.70);
      --glass: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.12);
      --text: #ecf7ff;
      --muted: #9db5c9;
      --subtle: #6c88a3;
      --line: rgba(173, 215, 255, 0.14);
      --shadow: 0 18px 55px rgba(0, 0, 0, 0.35);
      --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.20);
      --success: #2ee6a6;
      --warning: #ffcc66;
      --danger: #ff6f91;
      --radius: 22px;
      --radius-sm: 14px;
      --header-height: 82px;
      --sidebar-width: 300px;
      --accent: #51d3ff;
      --accent-2: #2f7cff;
      --accent-3: #7be7ff;
      --gradient: linear-gradient(135deg, var(--accent-2), var(--accent));
      --gradient-soft: linear-gradient(135deg, rgba(47, 124, 255, 0.24), rgba(81, 211, 255, 0.16));
      --input-bg: rgba(255, 255, 255, 0.05);
      --input-bg-focus: rgba(255, 255, 255, 0.08);
    }

    html[data-theme="light"] {
      --bg: #eaf4ff;
      --bg-2: #dcecff;
      --panel: rgba(255, 255, 255, 0.78);
      --panel-2: rgba(255, 255, 255, 0.72);
      --card: rgba(255, 255, 255, 0.74);
      --glass: rgba(255, 255, 255, 0.5);
      --glass-border: rgba(255, 255, 255, 0.45);
      --text: #0f1722;
      --muted: #41617d;
      --subtle: #6886a1;
      --line: rgba(11, 25, 39, 0.1);
      --shadow: 0 18px 55px rgba(32, 76, 122, 0.12);
      --shadow-soft: 0 10px 30px rgba(32, 76, 122, 0.10);
      --input-bg: rgba(8, 24, 44, 0.05);
      --input-bg-focus: rgba(8, 24, 44, 0.08);
    }

    html[data-accent="cyan"] {
      --accent: #51d3ff;
      --accent-2: #2f7cff;
      --accent-3: #80f0ff;
    }

    html[data-accent="blue"] {
      --accent: #72a8ff;
      --accent-2: #275efe;
      --accent-3: #9bc3ff;
    }

    html[data-accent="mint"] {
      --accent: #52f1c5;
      --accent-2: #03b89a;
      --accent-3: #9cffea;
    }

    html[data-accent="purple"] {
      --accent: #b08bff;
      --accent-2: #7357ff;
      --accent-3: #d5c3ff;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(52, 123, 255, 0.18), transparent 35%),
        radial-gradient(circle at bottom right, rgba(81, 211, 255, 0.12), transparent 30%),
        linear-gradient(180deg, var(--bg), var(--bg-2));
      color: var(--text);
      overflow-x: hidden;
    }

    body.sidebar-open { overflow: hidden; }

    ::selection {
      background: rgba(81, 211, 255, 0.28);
      color: var(--text);
    }

    button, input, textarea, select { font: inherit; }
    a { color: var(--accent); text-decoration: none; }
    h1, h2, h3, h4, p { margin: 0; }

    .loader {
      position: fixed;
      inset: 0;
      z-index: 2000;
      background:
        radial-gradient(circle at center, rgba(81, 211, 255, 0.10), transparent 40%),
        linear-gradient(180deg, #07111f, #091728);
      display: grid;
      place-items: center;
      text-align: center;
      transition: opacity 0.55s ease, visibility 0.55s ease;
    }

    .loader.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .loader-mark {
      position: relative;
      width: 112px;
      height: 112px;
      margin: 0 auto 18px;
    }

    .loader-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, 0.12);
      border-top-color: var(--accent);
      animation: spin 1s linear infinite;
    }

    .loader-core {
      width: 72px;
      height: 72px;
      border-radius: 24px;
      background: var(--gradient);
      display: grid;
      place-items: center;
      position: absolute;
      inset: 20px;
      box-shadow: 0 0 40px rgba(81, 211, 255, 0.4);
    }

    .loader-core svg {
      width: 34px;
      height: 34px;
      color: white;
    }

    .loader h1 {
      font-size: 2rem;
      margin-bottom: 8px;
    }

    .loader p { color: var(--muted); }

    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.22;
      z-index: 0;
      pointer-events: none;
    }

    .orb-1 {
      width: 320px;
      height: 320px;
      top: -80px;
      left: -80px;
      background: var(--accent-2);
      animation: driftA 14s ease-in-out infinite;
    }

    .orb-2 {
      width: 280px;
      height: 280px;
      bottom: -100px;
      right: -60px;
      background: var(--accent);
      animation: driftB 16s ease-in-out infinite;
    }

    .orb-3 {
      width: 220px;
      height: 220px;
      top: 38%;
      right: 18%;
      background: rgba(146, 105, 255, 0.75);
      animation: driftC 18s ease-in-out infinite;
    }

    .particle-field {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.35);
      box-shadow: 0 0 18px rgba(81, 211, 255, 0.55);
      animation: floatParticle 12s linear infinite;
    }

    .particle:nth-child(1)  { top: 15%; left: 10%; animation-delay: 0s; }
    .particle:nth-child(2)  { top: 30%; left: 20%; animation-delay: 3s; }
    .particle:nth-child(3)  { top: 65%; left: 12%; animation-delay: 2s; }
    .particle:nth-child(4)  { top: 78%; left: 28%; animation-delay: 7s; }
    .particle:nth-child(5)  { top: 12%; right: 22%; animation-delay: 5s; }
    .particle:nth-child(6)  { top: 42%; right: 10%; animation-delay: 1s; }
    .particle:nth-child(7)  { top: 72%; right: 18%; animation-delay: 4s; }
    .particle:nth-child(8)  { top: 85%; right: 35%; animation-delay: 6s; }
    .particle:nth-child(9)  { top: 25%; left: 45%; animation-delay: 8s; }
    .particle:nth-child(10) { top: 50%; left: 55%; animation-delay: 9s; }
    .particle:nth-child(11) { top: 68%; left: 48%; animation-delay: 1.5s; }
    .particle:nth-child(12) { top: 8%; left: 70%; animation-delay: 10s; }

    .app-shell {
      position: relative;
      z-index: 1;
    }

    .glass {
      background: var(--panel);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--glass-border);
      box-shadow: var(--shadow);
    }

    .glass-soft {
      background: var(--panel-2);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .sidebar {
      position: fixed;
      left: 12px;
      top: 12px;
      bottom: 12px;
      width: min(calc(100vw - 24px), var(--sidebar-width));
      border-radius: 28px;
      padding: 18px 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      transform: translateX(-110%);
      transition: transform 0.35s ease;
      z-index: 30;
    }

    .sidebar.open { transform: translateX(0); }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 12px 6px;
    }

    .brand-icon {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      background: var(--gradient);
      display: grid;
      place-items: center;
      box-shadow: 0 15px 35px rgba(47, 124, 255, 0.35);
    }

    .brand-icon svg {
      width: 24px;
      height: 24px;
      color: white;
    }

    .brand h1 {
      font-size: 1.1rem;
      margin-bottom: 2px;
    }

    .brand p {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .nav-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .nav-link {
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--muted);
      padding: 12px 14px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.28s ease;
      text-align: left;
    }

    .nav-link svg {
      width: 19px;
      height: 19px;
      flex: 0 0 19px;
    }

    .nav-link:hover,
    .nav-link.active {
      color: var(--text);
      background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 10px 30px rgba(0,0,0,0.18);
      transform: translateX(4px);
    }

    .sidebar-footer { margin-top: auto; }

    .mini-profile {
      padding: 14px;
      border-radius: 18px;
      display: grid;
      gap: 4px;
    }

    .mini-profile span,
    .mini-profile small { color: var(--muted); }

    .main-content {
      padding: 14px;
      width: 100%;
    }

    .topbar {
      position: sticky;
      top: 14px;
      z-index: 20;
      min-height: var(--header-height);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 16px;
      margin-bottom: 14px;
    }

    .topbar-left,
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.72rem;
      color: var(--subtle);
      margin-bottom: 4px;
    }

    .clock-pill {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      color: var(--muted);
    }

    .clock-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 14px var(--success);
    }

    .icon-btn {
      width: 46px;
      height: 46px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--text);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: transform 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
    }

    .icon-btn:hover {
      transform: translateY(-2px) scale(1.02);
      background: rgba(255,255,255,0.1);
      box-shadow: var(--shadow-soft);
    }

    .icon-btn svg {
      width: 20px;
      height: 20px;
    }

    .page {
      display: none;
      animation: pageEnter 0.48s ease;
    }

    .page.active { display: block; }

    .page-inner,
    .stack-block { display: grid; gap: 14px; }

    .hero {
      padding: 22px;
      border-radius: 28px;
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto -80px -80px auto;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(81, 211, 255, 0.28), transparent 65%);
      filter: blur(20px);
    }

    .hero-grid { display: grid; gap: 14px; }

    .hero h2 {
      font-size: clamp(1.8rem, 4vw, 3rem);
      margin-bottom: 8px;
    }

    .hero p {
      color: var(--muted);
      line-height: 1.6;
    }

    .hero-actions,
    .grid,
    .stats-grid,
    .metric-grid,
    .card-grid,
    .two-col,
    .three-col,
    .four-col {
      display: grid;
      gap: 14px;
    }

    .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }

    .card,
    .metric-card,
    .feature-card,
    .rule-card,
    .badge-card,
    .timeline-card,
    .list-card,
    .chart-card,
    .form-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow-soft);
      transition: transform 0.28s ease, box-shadow 0.28s ease, border-color 0.28s ease;
    }

    .card:hover,
    .metric-card:hover,
    .feature-card:hover,
    .rule-card:hover,
    .badge-card:hover,
    .timeline-card:hover,
    .list-card:hover,
    .chart-card:hover,
    .form-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow);
      border-color: rgba(81, 211, 255, 0.22);
    }

    .metric-card {
      position: relative;
      overflow: hidden;
    }

    .metric-card::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(81, 211, 255, 0.24), transparent, rgba(47, 124, 255, 0.18));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
    }

    .metric-head,
    .section-head,
    .card-head,
    .row-between {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .card-title {
      font-size: 1.02rem;
      margin-bottom: 6px;
    }

    .muted { color: var(--muted); }
    .subtle { color: var(--subtle); }

    .big-number {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 800;
      line-height: 1;
      margin: 6px 0;
    }

    .pill,
    .tag,
    .badge,
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.05);
      color: var(--text);
    }

    .pill strong,
    .tag strong { font-weight: 650; }

    .tag {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .badge { background: rgba(81, 211, 255, 0.12); }

    .status-pill.success {
      color: #062817;
      background: var(--success);
    }

    .status-pill.warning {
      color: #2e1b00;
      background: var(--warning);
    }

    .status-pill.danger {
      color: white;
      background: var(--danger);
    }

    .progress {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
    }

    .progress span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: var(--gradient);
      box-shadow: 0 0 26px rgba(81, 211, 255, 0.45);
    }

    .form-grid { display: grid; gap: 12px; }

    .form-row {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr;
    }

    .form-group {
      display: grid;
      gap: 8px;
    }

    label {
      color: var(--muted);
      font-size: 0.92rem;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid transparent;
      border-radius: 16px;
      background: var(--input-bg);
      color: var(--text);
      padding: 13px 14px;
      outline: none;
      transition: border-color 0.22s ease, background 0.22s ease, box-shadow 0.22s ease;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: rgba(81, 211, 255, 0.28);
      background: var(--input-bg-focus);
      box-shadow: 0 0 0 4px rgba(81, 211, 255, 0.08);
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .btn,
    .btn-secondary,
    .btn-ghost,
    .btn-danger {
      border: 0;
      border-radius: 16px;
      padding: 12px 16px;
      cursor: pointer;
      font-weight: 650;
      transition: transform 0.25s ease, box-shadow 0.25s ease, opacity 0.25s ease;
    }

    .btn {
      color: white;
      background: var(--gradient);
      box-shadow: 0 15px 35px rgba(47, 124, 255, 0.25);
    }

    .btn-secondary {
      color: var(--text);
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--line);
    }

    .btn-secondary.active {
      background: var(--gradient-soft);
      border-color: rgba(81,211,255,0.28);
    }

    .btn-ghost {
      color: var(--muted);
      background: transparent;
      border: 1px dashed var(--line);
    }

    .btn-danger {
      color: white;
      background: linear-gradient(135deg, #ff5a7d, #ff7d5a);
    }

    .btn:hover,
    .btn-secondary:hover,
    .btn-ghost:hover,
    .btn-danger:hover {
      transform: translateY(-2px);
    }

    .inline-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .timeline-list,
    .check-list,
    .simple-list,
    .kpi-list,
    .goal-list {
      display: grid;
      gap: 10px;
    }

    .timeline-item,
    .check-item,
    .simple-item,
    .list-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.05);
    }

    .timeline-time {
      width: 72px;
      text-align: center;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(81, 211, 255, 0.10);
      color: var(--accent-3);
      font-weight: 700;
    }

    .check-item.done,
    .timeline-item.done { opacity: 0.72; }

    .check-input {
      width: 20px;
      height: 20px;
      accent-color: var(--accent);
    }

    .note-block {
      padding: 15px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.04);
      color: var(--muted);
      line-height: 1.7;
    }

    .quote-card {
      padding: 20px;
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(47, 124, 255, 0.18), rgba(81, 211, 255, 0.08));
      border: 1px solid rgba(81, 211, 255, 0.16);
    }

    .quote-card blockquote {
      font-size: 1.02rem;
      line-height: 1.7;
      margin: 0 0 10px 0;
    }

    .quote-card cite {
      color: var(--muted);
      font-style: normal;
    }

    .book-grid,
    .project-grid,
    .badge-grid,
    .rules-grid,
    .goal-grid {
      display: grid;
      gap: 14px;
    }

    .book-card,
    .project-card,
    .badge-card,
    .rule-card {
      display: grid;
      gap: 14px;
    }

    .book-cover {
      height: 170px;
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.08), transparent),
        linear-gradient(135deg, hsl(var(--cover-hue), 90%, 55%), hsl(calc(var(--cover-hue) + 45), 90%, 60%));
      display: flex;
      align-items: flex-end;
      padding: 16px;
      color: white;
      font-weight: 800;
      font-size: 1.1rem;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.3);
    }

    .small { font-size: 0.9rem; }
    .tiny { font-size: 0.8rem; }

    .kbd {
      padding: 4px 8px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.06);
      color: var(--muted);
    }

    .switch-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 0;
    }

    .switch-row + .switch-row {
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .chart-wrap {
      display: grid;
      gap: 12px;
    }

    .chart-svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .chart-labels,
    .bar-labels {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--subtle);
      font-size: 0.8rem;
    }

    .bar-chart {
      display: grid;
      gap: 10px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: minmax(56px, 68px) 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .bar-row .bar-track {
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      overflow: hidden;
    }

    .bar-row .bar-track span {
      display: block;
      height: 100%;
      border-radius: 999px;
      background: var(--gradient);
    }

    .ring-wrap {
      width: 156px;
      height: 156px;
      position: relative;
      margin: 0 auto;
    }

    .ring-wrap svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .ring-center {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
    }

    .ring-value {
      font-size: 1.8rem;
      font-weight: 800;
    }

    .ring-label {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .table-like {
      display: grid;
      gap: 10px;
    }

    .table-head,
    .table-row {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .table-head {
      color: var(--subtle);
      font-size: 0.82rem;
      padding: 0 6px;
    }

    .table-row {
      padding: 12px;
      background: rgba(255,255,255,0.04);
      border-radius: 15px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .topic-details {
      display: grid;
      gap: 12px;
    }

    .phase-box details {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255,255,255,0.04);
      overflow: hidden;
    }

    .phase-box summary {
      list-style: none;
      cursor: pointer;
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .phase-box summary::-webkit-details-marker { display: none; }

    .topic-card {
      margin: 0 14px 14px;
      padding: 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      display: grid;
      gap: 12px;
    }

    .topic-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .topic-mini {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .goal-column { display: grid; gap: 12px; }

    .achievement-icon {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: var(--gradient-soft);
      color: var(--accent-3);
      box-shadow: 0 10px 25px rgba(47, 124, 255, 0.18);
    }

    .achievement-icon svg {
      width: 26px;
      height: 26px;
    }

    .badge-card.locked {
      opacity: 0.58;
      filter: grayscale(0.3);
    }

    .rule-card {
      position: relative;
      overflow: hidden;
    }

    .rule-card::before {
      content: "";
      position: absolute;
      top: -20%;
      right: -10%;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(81,211,255,0.18), transparent 70%);
    }

    .color-picker-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .color-chip {
      width: 44px;
      height: 44px;
      border: 2px solid transparent;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .color-chip.active {
      border-color: white;
      box-shadow: 0 0 0 4px rgba(81, 211, 255, 0.12);
    }

    .toast-wrap {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 60;
      display: grid;
      gap: 10px;
    }

    .toast {
      min-width: 250px;
      max-width: 360px;
      padding: 14px 16px;
      border-radius: 18px;
      background: var(--panel);
      border: 1px solid var(--glass-border);
      color: var(--text);
      box-shadow: var(--shadow);
      animation: slideUpFade 0.35s ease;
    }

    .empty-state {
      padding: 18px;
      border-radius: 18px;
      border: 1px dashed var(--line);
      color: var(--muted);
      text-align: center;
    }

    .divider {
      height: 1px;
      width: 100%;
      background: var(--line);
    }

    .mobile-only { display: inline-grid; }
    .desktop-only { display: none; }

    @media (min-width: 700px) {
      .hero-grid,
      .metric-grid,
      .stats-grid,
      .book-grid,
      .project-grid,
      .badge-grid,
      .rules-grid,
      .card-grid,
      .goal-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .form-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (min-width: 960px) {
      .sidebar {
        transform: none;
        left: 14px;
      }

      .main-content {
        margin-left: calc(var(--sidebar-width) + 28px);
        padding: 14px 18px 18px 0;
      }

      .mobile-only { display: none; }
      .desktop-only { display: inline-grid; }

      .hero-grid {
        grid-template-columns: 1.4fr 0.9fr;
      }

      .metric-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .stats-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .book-grid,
      .project-grid,
      .badge-grid,
      .rules-grid,
      .card-grid,
      .goal-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .goal-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (min-width: 1280px) {
      .book-grid,
      .project-grid,
      .badge-grid,
      .rules-grid,
      .card-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .goal-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pageEnter {
      from {
        opacity: 0;
        transform: translateY(12px) scale(0.99);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes slideUpFade {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes floatParticle {
      0%   { transform: translateY(0) scale(0.8); opacity: 0; }
      10%  { opacity: 1; }
      50%  { transform: translateY(-30px) scale(1); }
      100% { transform: translateY(-70px) scale(0.8); opacity: 0; }
    }

    @keyframes driftA {
      0%, 100% { transform: translate3d(0,0,0); }
      50%      { transform: translate3d(30px,35px,0); }
    }

    @keyframes driftB {
      0%, 100% { transform: translate3d(0,0,0); }
      50%      { transform: translate3d(-25px,-30px,0); }
    }

    @keyframes driftC {
      0%, 100% { transform: translate3d(0,0,0); }
      50%      { transform: translate3d(18px,-25px,0); }
    }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 0 rgba(81, 211, 255, 0); }
      50%      { box-shadow: 0 0 28px rgba(81, 211, 255, 0.25); }
    }

    @keyframes floatCard {
      0%, 100% { transform: translateY(0px); }
      50%      { transform: translateY(-5px); }
    }

    .hero,
    .metric-card:nth-child(2n),
    .quote-card,
    .book-card:nth-child(3n),
    .project-card:nth-child(2n) {
      animation: floatCard 7s ease-in-out infinite;
    }

    .btn,
    .icon-btn,
    .nav-link.active,
    .brand-icon {
      animation: pulseGlow 4s ease-in-out infinite;
    }
  </style>
</head>

      const PHASE_RESOURCES = {
        "Phase 1": {
          books: ["The Linux Command Line","Advanced Programming in the UNIX Environment"],
          courses: ["Linux Journey","Beej's Guide to Network Concepts"],
          projects: ["Build a shell command cheat sheet","Automate a Linux study workflow"],

      function uid(prefix = "id") {
        return prefix + "_" + Math.random().toString(36).slice(2, 10);
      }

      function todayKey(date = new Date()) {
        const adjusted = new Date(date.getTime() - date.getTimezoneOffset() * 60000);
        return adjusted.toISOString().split("T")[0];
      }

      function dayKeyOffset(offset = 0) {
        const d = new Date();
        d.setDate(d.getDate() + offset);
        return todayKey(d);
      }

      function clone(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function isObject(value) {
        return value && typeof value === "object" && !Array.isArray(value);
      }

      function mergeDeep(base, incoming) {
        if (Array.isArray(base)) return Array.isArray(incoming) ? incoming : clone(base);
        if (isObject(base)) {
          const out = {};
          const keys = new Set([...(Object.keys(base || {})), ...(Object.keys(incoming || {}))]);
          keys.forEach((key) => {
            out[key] = mergeDeep(base ? base[key] : undefined, incoming ? incoming[key] : undefined);
          });
          return out;
        }
        return incoming !== undefined ? incoming : base;
      }

      function createTopic(phaseName, focus, topic, index) {
        const pack = PHASE_RESOURCES[phaseName];
        return {
          id: uid("topic"),

          description: "Master " + topic + " as part of " + focus + " through practical embedded-oriented exercises, notes, labs, and review sessions.",

          estimatedHours: pack.baseHours + index * 2,
          progress: 0,
          notes: "",

        };

      function createRoadmap() {
        return ROADMAP_BLUEPRINT.map((phase) => ({
          id: uid("phase"),
          name: phase.name,
          focus: phase.focus,
          topics: phase.topics.map((topic, index) => createTopic(phase.name, phase.focus, topic, index))
        }));
      }

      function defaultBooks() {
        return [
          { id: uid("book"), title: "Mastering Embedded Linux Programming", author: "Chris Simmonds", coverHue: 195, progress: 18, currentChapter: "Toolchains and Boot Process", notes: "", bookmarks: "Kernel configuration, toolchain notes", completed: false },

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function ring(percent, label = "Progress") {
        const safe = clamp(percent || 0, 0, 100);
        const radius = 52;
        const circumference = 2 * Math.PI * radius;
        const dash = (safe / 100) * circumference;

        return `
          <div class="ring-wrap">
            <svg viewBox="0 0 140 140" class="chart-svg" aria-hidden="true">
              <circle cx="70" cy="70" r="${radius}" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="10"></circle>
              <circle cx="70" cy="70" r="${radius}" fill="none" stroke="url(#ringGrad)" stroke-width="10" stroke-linecap="round"
                      stroke-dasharray="${dash} ${circumference}" stroke-dashoffset="0"></circle>
              <defs>
                <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="var(--accent-2)"></stop>
                  <stop offset="100%" stop-color="var(--accent)"></stop>
                </linearGradient>
              </defs>
            </svg>
            <div class="ring-center">
              <div class="ring-value">${Math.round(safe)}%</div>
              <div class="ring-label">${label}</div>
            </div>
          </div>
        `;
      }

      function line(data = [], labels = []) {
        const width = 360;
        const height = 140;
        const pad = 12;
        const safeData = data.length ? data : [0, 0, 0, 0, 0, 0, 0];
        const max = Math.max(...safeData, 1);
        const stepX = (width - pad * 2) / Math.max(safeData.length - 1, 1);

        const points = safeData.map((value, index) => {
          const x = pad + index * stepX;
          const y = height - pad - (value / max) * (height - pad * 2);
          return `${x},${y}`;
        }).join(" ");

        const circles = safeData.map((value, index) => {
          const x = pad + index * stepX;
          const y = height - pad - (value / max) * (height - pad * 2);
          return `<circle cx="${x}" cy="${y}" r="3.5" fill="var(--accent)"></circle>`;
        }).join("");

        return `
          <div class="chart-wrap">
            <svg viewBox="0 0 ${width} ${height}" class="chart-svg" role="img" aria-label="Line chart">
              <defs>
                <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="var(--accent-2)"></stop>
                  <stop offset="100%" stop-color="var(--accent)"></stop>
                </linearGradient>
              </defs>
              <polyline points="${points}" fill="none" stroke="url(#lineGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></polyline>
              ${circles}
            </svg>
            <div class="chart-labels">
              ${labels.map((label) => `<span>${label}</span>`).join("")}
            </div>
          </div>
        `;
      }

      function bars(items = []) {
        return `
          <div class="bar-chart">
            ${items.map((item) => `
              <div class="bar-row">
                <span class="tiny muted">${item.label}</span>
                <div class="bar-track"><span style="width:${Math.max(0, Math.min(100, item.value))}%"></span></div>
                <strong class="tiny">${item.display ?? `${Math.round(item.value)}%`}</strong>
              </div>
            `).join("")}
          </div>
        `;
      }

      window.ChartKit = { ring, line, bars };

      utils: {
        escape(value) {
          return String(value ?? "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
        },

        prettyDate(dateKey) {
          return new Date(dateKey + "T00:00:00").toLocaleDateString("en-US", {
            weekday: "long",
            year: "numeric",
            month: "long",
            day: "numeric"
          });
        },

        pickDaily(list, salt = 0) {
          const seed = Number(EngineerStorage.todayKey().replaceAll("-", "")) + salt;
          return list[seed % list.length];
        },

        lastNDates(n) {
          return [...Array(n)].map((_, index) => {
            const offset = index - (n - 1);
            return EngineerStorage.dayKeyOffset(offset);
          });
        },

        calculateStudyStreak() {
          let streak = 0;
          for (let i = 0; i < 365; i += 1) {
            const date = EngineerStorage.dayKeyOffset(-i);
            const hours = Number(App.state.metrics.daily[date]?.studyHours || 0);
            if (hours > 0) streak += 1;
            else break;
          }
          return streak;
        },

        calculateQuranStreak() {
          let streak = 0;
          for (let i = 0; i < 365; i += 1) {
            const date = EngineerStorage.dayKeyOffset(-i);
            const pages = Number(App.state.islam.quranByDate[date]?.pages || 0);
            if (pages > 0) streak += 1;
            else break;
          }
          return streak;
        },

        getPrayerProgress(date = EngineerStorage.todayKey()) {
          const prayers = App.state.islam.prayersByDate[date] || {};
          const done = Object.values(prayers).filter(Boolean).length;
          return (done / EngineerStorage.PRAYER_NAMES.length) * 100;
        },

        getTaskProgress(date = EngineerStorage.todayKey()) {
          const tasks = App.state.planner.tasksByDate[date] || [];
          const done = tasks.filter((task) => task.done).length;
          return tasks.length ? (done / tasks.length) * 100 : 0;
        },

        totalStudyHours() {
          return Object.values(App.state.metrics.daily).reduce((sum, day) => sum + Number(day.studyHours || 0), 0);
        },

        studyDaysCount() {
          return Object.values(App.state.metrics.daily).filter((day) => Number(day.studyHours || 0) > 0).length;
        },

        currentBook() {
          return App.state.books.find((book) => Number(book.progress) < 100) || App.state.books[0];
        },

        currentPhase() {
          return App.state.roadmap.phases.find((phase) => phase.topics.some((topic) => !topic.completed)) || App.state.roadmap.phases[App.state.roadmap.phases.length - 1];
        },

        roadmapPercent() {
          const topics = App.state.roadmap.phases.flatMap((phase) => phase.topics);
          return topics.length ? topics.reduce((sum, topic) => sum + Number(topic.progress || 0), 0) / topics.length : 0;
        },

        achievements() {
          const totalHours = this.totalStudyHours();
          const studyDays = this.studyDaysCount();
          const firstBookDone = App.state.books.some((book) => Number(book.progress || 0) >= 100);
          const firstKernelDriver = App.state.roadmap.phases.flatMap((phase) => phase.topics)
            .some((topic) => ["Character Drivers","Platform Drivers"].includes(topic.title) && topic.completed);
          const firstInterview = App.state.career.applications.some((app) => app.interview || app.status === "Interview");
          const firstJob = App.state.career.applications.some((app) => ["Offer","Hired"].includes(app.status));
          const senior = totalHours >= 1000 && studyDays >= 180;

          return [
            { title: "30 Study Days", unlocked: studyDays >= 30, hint: studyDays + "/30 days" },
            { title: "100 Study Hours", unlocked: totalHours >= 100, hint: Math.round(totalHours) + "/100 hours" },
            { title: "First Kernel Driver", unlocked: firstKernelDriver, hint: "Complete Character Drivers or Platform Drivers" },
            { title: "Finish First Book", unlocked: firstBookDone, hint: "Reach 100% in any book" },
            { title: "100 GitHub Commits", unlocked: Number(App.state.career.githubCommits || 0) >= 100, hint: (App.state.career.githubCommits || 0) + "/100 commits" },
            { title: "First Interview", unlocked: firstInterview, hint: "Mark one interview" },
            { title: "First Job", unlocked: firstJob, hint: "Receive an offer" },
            { title: "Senior Engineer", unlocked: senior, hint: "1000+ hours and long consistency" }
          ];
        }
      },

      saveOnly() {
        EngineerStorage.saveData(this.state);
      },

      update(sections = []) {
        EngineerStorage.ensureDailyState(this.state);
        this.saveOnly();
        sections.forEach((section) => {
          if (this.renderers[section]) this.renderers[section]();
        });
      },

      applyAppearance() {
        document.documentElement.dataset.theme = this.state.settings.theme || "dark";
        document.documentElement.dataset.accent = this.state.settings.accent || "cyan";
        this.saveOnly();
      },

      toast(message) {
        const wrap = document.getElementById("toastWrap");
        const item = document.createElement("div");
        item.className = "toast";
        item.textContent = message;
        wrap.appendChild(item);
        setTimeout(() => item.remove(), 2400);

      showSection(sectionId) {
        document.querySelectorAll(".page").forEach((page) => page.classList.toggle("active", page.id === sectionId));

        document.getElementById("pageTitle").textContent = activeLabel;
        this.state.ui.lastSection = sectionId;
        this.saveOnly();
        document.body.classList.remove("sidebar-open");
        document.getElementById("sidebar").classList.remove("open");

      }

        const yearlyBars = [
          { label: "Study", value: Math.min((App.utils.totalStudyHours() / 300) * 100, 100), display: Math.round(App.utils.totalStudyHours()) + "h" },
          { label: "Books", value: App.state.books.length ? (App.state.books.filter((book) => Number(book.progress || 0) >= 100).length / App.state.books.length) * 100 : 0, display: App.state.books.filter((book) => Number(book.progress || 0) >= 100).length + "/" + App.state.books.length },
          { label: "Projects", value: App.state.projects.length ? App.state.projects.reduce((sum, p) => sum + Number(p.progress || 0), 0) / App.state.projects.length : 0 },
          { label: "Prayer", value: Math.round(App.utils.getPrayerProgress()) },
          { label: "Workout", value: Object.values(App.state.metrics.daily).filter((day) => day.workoutDone).length ? Math.min((Object.values(App.state.metrics.daily).filter((day) => day.workoutDone).length / 30) * 100, 100) : 0 }
        ];

        container.innerHTML = `
          <div class="page-inner">
            <div class="hero glass">
              <p class="eyebrow">Statistics</p>
              <h2>Weekly, monthly, yearly visibility</h2>
              <p>Statistics help you see whether your system is actually working.</p>
            </div>

            <div class="stats-grid">
              <div class="chart-card">
                <h3 class="card-title">Weekly Study Hours</h3>
                ${ChartKit.line(study, dates.map((date) => date.slice(5)))}
              </div>
              <div class="chart-card">
                <h3 class="card-title">Weekly Coding Hours</h3>
                ${ChartKit.line(coding, dates.map((date) => date.slice(5)))}
              </div>
              <div class="chart-card">
                <h3 class="card-title">Weekly Prayer Progress</h3>
                ${ChartKit.line(prayer, dates.map((date) => date.slice(5)))}
              </div>
            </div>

            <div class="card-grid">
              <div class="chart-card">
                <h3 class="card-title">Books</h3>
                ${ChartKit.bars(books.map((book) => ({ label: book.label, value: book.value })))}
              </div>
              <div class="chart-card">
                <h3 class="card-title">Yearly Snapshot</h3>
                ${ChartKit.bars(yearlyBars)}
              </div>
              <div class="chart-card">
                <h3 class="card-title">Key Totals</h3>
                <div class="simple-list">
                  <div class="simple-item"><span>Study Hours</span><strong>${Math.round(App.utils.totalStudyHours())}</strong></div>
                  <div class="simple-item"><span>Study Days</span><strong>${App.utils.studyDaysCount()}</strong></div>
                  <div class="simple-item"><span>Books Completed</span><strong>${App.state.books.filter((book) => Number(book.progress || 0) >= 100).length}</strong></div>
                  <div class="simple-item"><span>Projects Active</span><strong>${App.state.projects.length}</strong></div>
                  <div class="simple-item"><span>PFE Completion</span><strong>${App.state.pfe.completion}%</strong></div>
                </div>
              </div>
            </div>
          </div>
        `;
      };

      App.renderers.rules = function renderRules() {
        const container = document.getElementById("rules");
        container.innerHTML = `
          <div class="page-inner">
            <div class="hero glass">
              <p class="eyebrow">Rules</p>
              <h2>Operating principles</h2>
              <p>These are not reminders. These are system rules.</p>
            </div>

            <div class="rules-grid">
              ${App.state.rules.map((rule) => `
                <div class="rule-card">
                  <div class="achievement-icon">
                    <svg viewBox="0 0 24 24"><path d="M9 12l2 2 4-5m-3-7a10 10 0 100 20 10 10 0 000-20z" stroke="currentColor" stroke-width="2" fill="none"/></svg>
                  </div>
                  <h3 class="card-title" style="margin-top:12px;">${App.utils.escape(rule)}</h3>
                  <p class="muted">Make it visible. Make it habitual. Make it non-negotiable.</p>
                </div>
              `).join("")}
            </div>
          </div>
        `;
      };

      App.renderers.achievements = function renderAchievements() {
        const container = document.getElementById("achievements");
        const badges = App.utils.achievements();

        container.innerHTML = `
          <div class="page-inner">
            <div class="hero glass">
              <p class="eyebrow">Achievements</p>
              <h2>Unlocked by consistency</h2>
              <p>Every badge represents evidence, not intention.</p>
            </div>

            <div class="badge-grid">
              ${badges.map((badge) => `
                <div class="badge-card ${badge.unlocked ? "" : "locked"}">
                  <div class="achievement-icon">
                    <svg viewBox="0 0 24 24"><path d="M12 2l3 6 6 .9-4.5 4.4 1.1 6.2-5.6-3-5.6 3 1.1-6.2L3 8.9 9 8l3-6z" fill="currentColor"/></svg>
                  </div>
                  <h3 class="card-title" style="margin-top:12px;">${badge.title}</h3>
                  <p class="muted">${badge.unlocked ? "Unlocked" : badge.hint}</p>
                  <span class="status-pill ${badge.unlocked ? "success" : "warning"}">${badge.unlocked ? "Unlocked" : "Locked"}</span>
                </div>
              `).join("")}
            </div>
          </div>
        `;
      };

      App.renderers.about = function renderAbout() {
        const container = document.getElementById("about");
        const profile = App.state.profile;

        container.innerHTML = `
          <div class="page-inner">
            <div class="hero glass hero-grid">
              <div>
                <p class="eyebrow">About</p>
                <h2>${App.utils.escape(profile.name)}</h2>
                <p>${App.utils.escape(profile.role)} — building a life system centered on Embedded Systems, Embedded Linux, AI, STM32, and Raspberry Pi.</p>
                <div class="inline-actions" style="margin-top:14px;">
                  ${profile.tags.map((tag) => `<span class="tag">${App.utils.escape(tag)}</span>`).join("")}
                </div>
              </div>
              <div class="quote-card">
                <blockquote>"My Personal Operating System."</blockquote>
                <cite>${App.utils.escape(profile.name)}</cite>
              </div>
            </div>

            <div class="card-grid">
              <div class="card">
                <h3 class="card-title">What this app is</h3>
                <div class="note-block" style="margin-top:12px;">
                  A fully offline personal platform for discipline, study, prayer, health, roadmap execution, reading, project momentum, and career preparation.
                </div>
              </div>
              <div class="card">
                <h3 class="card-title">Design philosophy</h3>
                <div class="note-block" style="margin-top:12px;">
                  Premium, focused, offline, local-first, mobile-first, framework-free, and intentionally calm.
                </div>
              </div>
              <div class="card">
                <h3 class="card-title">Persistence</h3>
                <div class="note-block" style="margin-top:12px;">
                  All data is stored locally in your browser using LocalStorage. Export backups regularly.
                </div>
              </div>
            </div>
          </div>
        `;
      };

      document.querySelectorAll(".nav-link").forEach((button) => {
        button.addEventListener("click", () => App.showSection(button.dataset.section));
      });

      document.getElementById("mobileMenuBtn").addEventListener("click", () => {
        document.body.classList.toggle("sidebar-open");
        document.getElementById("sidebar").classList.toggle("open");
      });

      document.getElementById("quickThemeToggle").addEventListener("click", () => {
        App.state.settings.theme = App.state.settings.theme === "dark" ? "light" : "dark";
        App.applyAppearance();
        App.update(["settings"]);
      });

      App.fullRender();
      App.refreshClock();
      setInterval(() => App.refreshClock(), 1000);

      window.addEventListener("load", () => {
        setTimeout(() => document.getElementById("appLoader").classList.add("hidden"), 650);
      });
    });
  </script>
</body>
</html>
